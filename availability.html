<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disney DDP Planner — Reservation Availability</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    };
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .row-ts { border-left: 3px solid var(--pool-a); }
    .row-2ts { border-left: 3px solid #a78bfa; }
    .row-qs { border-left: 3px solid var(--pool-b); }
    .row-sn { border-left: 3px solid #fbbf24; }
    .row-oop { border-left: 3px solid var(--oop); }
    .row-unknown { border-left: 3px solid rgba(255,255,255,0.1); }

    .chip-cell {
      min-height: 40px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .chip-cell.has-data {
      background: rgba(251,191,36,0.05);
      border-color: rgba(251,191,36,0.25);
    }
    .chip-cell.has-confirmed {
      background: rgba(34,197,94,0.06);
      border-color: rgba(34,197,94,0.35);
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 3px; align-items: center; }
    .meal-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 1px 2px;
    }
    body.light-mode .meal-divider { background: rgba(0,0,0,0.1); }
    .time-chip {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 1px 4px 1px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      font-size: 10px;
      line-height: 1.4;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, border-color 0.1s;
    }
    .time-chip:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }
    .time-chip.picked {
      background: rgba(251,191,36,0.3);
      border-color: rgba(251,191,36,0.7);
      color: #fde68a;
    }
    .time-chip.confirmed {
      background: rgba(34,197,94,0.25);
      border-color: rgba(34,197,94,0.7);
      color: #bbf7d0;
    }
    .time-chip.confirmed.picked {
      background: rgba(34,197,94,0.4);
      border-color: rgba(34,197,94,0.9);
    }
    .time-chip .chip-x {
      color: rgba(255,255,255,0.35);
      padding: 0 3px;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
    }
    .time-chip .chip-x:hover { color: #f87171; }
    body.light-mode .time-chip { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.12); color: #1e293b; }
    body.light-mode .time-chip:hover { background: rgba(0,0,0,0.1); }
    body.light-mode .time-chip.picked { background: rgba(251,191,36,0.4); border-color: rgba(217,119,6,0.7); color: #78350f; }
    body.light-mode .time-chip.confirmed { background: rgba(34,197,94,0.3); border-color: rgba(21,128,61,0.7); color: #14532d; }
    .chip-add {
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 1px 7px;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      width: 70px;
      outline: none;
      font-family: inherit;
    }
    .chip-add::placeholder { color: rgba(255,255,255,0.25); }
    .chip-add:focus { border-color: rgba(251,191,36,0.5); border-style: solid; color: white; width: 100px; }
    body.light-mode .chip-add { border-color: rgba(0,0,0,0.2); color: rgba(0,0,0,0.5); }
    body.light-mode .chip-add::placeholder { color: rgba(0,0,0,0.35); }
    body.light-mode .chip-add:focus { color: #1e293b; }
    .confirm-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .confirm-btn {
      font-size: 10px; padding: 2px 7px; border-radius: 4px;
      background: rgba(251,191,36,0.25); border: 1px solid rgba(251,191,36,0.6);
      color: #fde68a; cursor: pointer; font-family: inherit;
    }
    .confirm-btn:hover { background: rgba(251,191,36,0.4); }
    .confirm-btn:disabled { opacity: 0.3; cursor: default; }
    .booked-tag {
      font-size: 10px; padding: 1px 6px; border-radius: 4px;
      background: rgba(34,197,94,0.25); border: 1px solid rgba(34,197,94,0.6);
      color: #bbf7d0; display: inline-flex; align-items: center; gap: 3px;
    }
    .unbook-link {
      font-size: 9px; color: rgba(255,255,255,0.4); cursor: pointer;
      text-decoration: underline;
    }
    .unbook-link:hover { color: #f87171; }
    body.light-mode .confirm-btn { background: rgba(251,191,36,0.4); border-color: rgba(217,119,6,0.7); color: #78350f; }
    body.light-mode .booked-tag { background: rgba(34,197,94,0.3); border-color: rgba(21,128,61,0.7); color: #14532d; }
    body.light-mode .unbook-link { color: rgba(0,0,0,0.5); }

    .matrix-table { border-collapse: separate; border-spacing: 0; }
    .matrix-table th, .matrix-table td { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .matrix-table thead th {
      position: sticky; top: 0;
      background: rgba(2,6,23,0.95);
      backdrop-filter: blur(10px);
      z-index: 5;
    }
    .matrix-table .name-col {
      position: sticky; left: 0;
      background: rgba(2,6,23,0.95);
      backdrop-filter: blur(10px);
      z-index: 4;
    }
    .matrix-table thead th.name-col { z-index: 6; }
    body.light-mode .matrix-table thead th,
    body.light-mode .matrix-table .name-col { background: rgba(255,255,255,0.95); }

    .view-btn { color: rgba(255,255,255,0.5); }
    .view-btn.active { background: rgba(251,191,36,0.18); color: #fcd34d; }
    body.light-mode .view-btn.active { color: #b45309; background: rgba(251,191,36,0.25); }

    .hide-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px; height: 16px;
      border-radius: 4px;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      user-select: none;
      flex-shrink: 0;
      transition: all 0.1s;
    }
    .hide-btn:hover { color: #f87171; background: rgba(255,255,255,0.06); }
    body.light-mode .hide-btn { color: rgba(0,0,0,0.3); }
    body.light-mode .hide-btn:hover { color: #dc2626; background: rgba(0,0,0,0.05); }

    .day-summary {
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 1px;
      font-weight: 400;
    }
    .ds-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      font-size: 9px;
      line-height: 1.25;
      max-width: 100%;
      overflow: hidden;
    }
    .ds-slot {
      display: inline-block;
      width: 8px;
      flex-shrink: 0;
      color: rgba(255,255,255,0.4);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .ds-park {
      display: inline-block;
      width: 18px;
      flex-shrink: 0;
      color: rgba(125,211,252,0.85);
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .ds-time {
      flex-shrink: 0;
      color: rgba(255,255,255,0.55);
      font-size: 9px;
      font-variant-numeric: tabular-nums;
      margin-right: 4px;
      min-width: 28px;
    }
    .ds-events-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 3px 2px;
    }
    .ds-counts {
      display: flex;
      gap: 6px;
      font-size: 9px;
      color: rgba(255,255,255,0.55);
      margin-top: 1px;
    }
    .ds-count { display: inline-flex; align-items: center; gap: 2px; }
    body.light-mode .day-summary { border-top-color: rgba(0,0,0,0.08); }
    body.light-mode .ds-slot { color: rgba(0,0,0,0.5); }
    body.light-mode .ds-counts { color: rgba(0,0,0,0.55); }
    body.light-mode .ds-park { color: #1d4ed8; }
    body.light-mode .ds-time { color: rgba(0,0,0,0.55); }
    body.light-mode .ds-events-divider { background: rgba(0,0,0,0.08); }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

  <div class="bg-blob" style="width:600px;height:600px;top:-200px;left:-100px;background:#3b82f6;"></div>
  <div class="bg-blob" style="width:500px;height:500px;bottom:-150px;right:-100px;background:#22c55e;"></div>

  <header class="sticky top-0 z-30 glass-card-darker border-b border-white/10" style="border-radius:0;">
    <div class="max-w-[1600px] mx-auto px-4 py-2 flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span class="text-xs hidden sm:inline">Planner</span>
      </a>
      <a href="restaurants.html" class="text-xs text-white/50 hover:text-amber-400 hidden sm:inline">All Restaurants</a>
      <div class="w-px h-5 bg-white/10 hidden sm:block"></div>
      <div class="flex items-center gap-2 mr-auto">
        <i data-lucide="calendar-check" class="w-5 h-5 text-amber-400"></i>
        <h1 class="text-base font-bold tracking-tight">Reservation Availability</h1>
        <span class="text-[10px] text-white/30 font-mono" id="count-tag"></span>
      </div>
      <div class="flex items-center gap-0.5 bg-white/5 rounded-lg p-0.5">
        <button id="view-entry"  class="view-btn px-2 py-1 text-xs rounded-md transition-colors">Entry</button>
        <button id="view-matrix" class="view-btn px-2 py-1 text-xs rounded-md transition-colors">Matrix</button>
      </div>
      <button id="sim-toggle" onclick="toggleSimMode()"
        class="px-2 py-1 text-xs rounded-md border border-white/10 hover:bg-white/10 transition-colors flex items-center gap-1"
        title="Show picked-but-not-booked times in the Planner as preview overlays">
        <i data-lucide="eye" class="w-3.5 h-3.5"></i>
        <span class="hidden sm:inline">Sim</span>
      </button>
      <button onclick="exportAvailability()" class="p-1.5 hover:bg-white/10 rounded-lg transition-colors" title="Export availability JSON">
        <i data-lucide="upload" class="w-4 h-4"></i>
      </button>
      <button onclick="document.getElementById('import-file').click()" class="p-1.5 hover:bg-white/10 rounded-lg transition-colors" title="Import availability JSON (merges with existing)">
        <i data-lucide="download" class="w-4 h-4"></i>
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none">
      <button onclick="toggleTheme()" class="p-1.5 hover:bg-white/10 rounded-lg transition-colors" title="Toggle theme">
        <i data-lucide="moon" class="w-4 h-4" id="theme-icon"></i>
      </button>
    </div>
  </header>

  <main class="max-w-[1600px] mx-auto px-4 py-4">

    <div id="empty-state" class="hidden glass-card p-8 text-center text-white/60">
      <i data-lucide="bookmark" class="w-12 h-12 mx-auto mb-3 text-white/20"></i>
      <p class="mb-2 text-sm">No saved restaurants yet.</p>
      <p class="text-xs">Go to <a href="restaurants.html" class="text-amber-400 hover:underline">All Restaurants</a> and check the ★ box on the ones you want to track.</p>
    </div>

    <div id="hidden-bar" class="hidden glass-card px-3 py-2 mb-3 text-xs text-white/60 flex items-center gap-3 flex-wrap">
      <i data-lucide="eye-off" class="w-3.5 h-3.5 text-white/40"></i>
      <span id="hidden-count"></span>
      <button id="show-all-hidden" class="text-amber-400 hover:underline ml-auto">Show all</button>
    </div>

    <div id="entry-view"></div>
    <div id="matrix-view" class="hidden"></div>

  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="js/config.js"></script>
  <script src="js/restaurant-db.js"></script>
  <script src="js/csv-restaurants.js"></script>
  <script src="js/restaurant-merge.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/credit-engine.js"></script>
  <script>
    const SHORTLIST_KEY = 'ddp_planner_shortlist';
    const AVAIL_KEY = 'ddp_planner_availability';
    const VIEW_KEY = 'ddp_planner_avail_view';
    const HIDDEN_RIDS_KEY = 'ddp_planner_avail_hidden_rids';
    const HIDDEN_DATES_KEY = 'ddp_planner_avail_hidden_dates';
    const SIM_KEY = 'ddp_planner_sim_picks';

    function isSimOn() { return localStorage.getItem(SIM_KEY) === 'on'; }
    function syncSimButton() {
      const btn = document.getElementById('sim-toggle');
      if (!btn) return;
      const on = isSimOn();
      btn.style.background = on ? 'rgba(168, 85, 247, 0.25)' : '';
      btn.style.borderColor = on ? 'rgba(168, 85, 247, 0.6)' : '';
      btn.style.color = on ? '#d8b4fe' : '';
      btn.title = on
        ? 'Sim ON — picked times overlay the Planner. Click to turn off.'
        : 'Show picked-but-not-booked times in the Planner as preview overlays';
    }
    function toggleSimMode() {
      if (isSimOn()) localStorage.removeItem(SIM_KEY);
      else localStorage.setItem(SIM_KEY, 'on');
      syncSimButton();
    }

    let hiddenRids = new Set();
    let hiddenDates = new Set();
    try { hiddenRids = new Set(JSON.parse(localStorage.getItem(HIDDEN_RIDS_KEY) || '[]')); } catch(e) {}
    try { hiddenDates = new Set(JSON.parse(localStorage.getItem(HIDDEN_DATES_KEY) || '[]')); } catch(e) {}
    function saveHidden() {
      localStorage.setItem(HIDDEN_RIDS_KEY, JSON.stringify([...hiddenRids]));
      localStorage.setItem(HIDDEN_DATES_KEY, JSON.stringify([...hiddenDates]));
    }
    function visibleDays() { return TRIP_DAYS.filter(td => !hiddenDates.has(td.date)); }
    function visibleShortlist() { return shortlist.filter(r => !hiddenRids.has(rid(r))); }
    function updateHiddenBar() {
      const bar = document.getElementById('hidden-bar');
      if (!bar) return;
      const total = hiddenRids.size + hiddenDates.size;
      if (total === 0) { bar.classList.add('hidden'); return; }
      bar.classList.remove('hidden');
      const parts = [];
      if (hiddenRids.size)  parts.push(`${hiddenRids.size} restaurant${hiddenRids.size > 1 ? 's' : ''}`);
      if (hiddenDates.size) parts.push(`${hiddenDates.size} date${hiddenDates.size > 1 ? 's' : ''}`);
      document.getElementById('hidden-count').textContent = `Hidden: ${parts.join(', ')}`;
    }

    function rid(r) { return r.id != null ? 'db:' + r.id : 'csv:' + r.name; }

    const allMerged = RestaurantMerge.getMerged();

    let shortlistIds = [];
    try { shortlistIds = JSON.parse(localStorage.getItem(SHORTLIST_KEY) || '[]'); } catch(e) {}

    let availability = {};
    try { availability = JSON.parse(localStorage.getItem(AVAIL_KEY) || '{}'); } catch(e) { availability = {}; }

    function saveAvailability() { localStorage.setItem(AVAIL_KEY, JSON.stringify(availability)); }
    function setCell(id, date, value) {
      const v = (value || '').trim();
      if (!availability[id]) availability[id] = {};
      if (v) availability[id][date] = v;
      else delete availability[id][date];
      if (Object.keys(availability[id]).length === 0) delete availability[id];
      saveAvailability();
    }

    const shortlist = shortlistIds
      .map(id => allMerged.find(r => rid(r) === id))
      .filter(Boolean);

    document.getElementById('count-tag').textContent = shortlist.length ? `${shortlist.length} saved` : '';

    function rowCls(r) {
      return r.creditType === '1TS' ? 'row-ts'
        : r.creditType === '2TS' ? 'row-2ts'
        : r.creditType === 'QS'  ? 'row-qs'
        : r.creditType === 'SN'  ? 'row-sn'
        : r.creditType === 'OOP' ? 'row-oop'
        : 'row-unknown';
    }
    function badgeCls(t) {
      return { '1TS':'badge-ts', '2TS':'badge-2ts', 'QS':'badge-qs', 'SN':'badge-sn', 'OOP':'badge-oop' }[t] || '';
    }

    const MEAL_ABBR = { breakfast: 'B', lunch: 'L', dinner: 'D', brunch: 'Br' };
    function vipMealsShort(meals) {
      if (!meals || !meals.length) return '';
      return meals.map(m => MEAL_ABBR[m] || (m[0] || '').toUpperCase()).join(',');
    }
    function vipBadge(r) {
      if (!r.vipDiscountPct) return '';
      const short = vipMealsShort(r.vipDiscountMeals);
      const fullMeals = (r.vipDiscountMeals || []).join(', ') || 'all meals';
      const note = r.vipDiscountNotes || 'Mon–Thu only';
      const tooltip = `${r.vipDiscountPct}% VIP off ${fullMeals} — ${note}`;
      return `<span class="badge badge-vip" title="${attr(tooltip)}">${r.vipDiscountPct}% VIP${short ? ' ' + short : ''}</span>`;
    }

    function truncateName(name, maxLen) {
      if (!name) return '';
      const cleaned = name.replace(/^The\s+/i, '').replace(/\s+Restaurant$/i, '');
      if (cleaned.length <= maxLen) return cleaned;
      return cleaned.slice(0, Math.max(1, maxLen - 1)) + '…';
    }
    // Park codes for the four theme parks (per user spec: M/A/H/E), plus Disney Springs
    // and the two water parks. Resort/Travel/Split days aren't parks — return blank
    // so the event line just shows time + name without a meaningless code.
    function parkLetter(park) {
      if (!park) return '';
      if (park === 'Magic Kingdom')      return 'M';
      if (park === 'EPCOT')              return 'E';
      if (park === 'Hollywood Studios')  return 'H';
      if (park === 'Animal Kingdom')     return 'A';
      if (park === 'Disney Springs')     return 'DS';
      if (park.indexOf('Typhoon') >= 0)  return 'TL';
      if (park.indexOf('Blizzard') >= 0) return 'BB';
      return '';
    }
    function summarizeDay(date) {
      const day = activePlan.plan.days && activePlan.plan.days[date];
      if (!day || !day.selections) return null;
      const meal = slot => {
        const sel = day.selections[slot];
        if (!sel) return null;
        const r = allMerged.find(x => x.id === sel.restaurantId);
        return r ? r.name : '?';
      };
      const snackCount = ['snack1','snack2','snack3','snack4'].filter(s => day.selections[s]).length;
      const events = Array.isArray(day.events) ? day.events.slice() : [];
      events.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
      const evRows = events.map(ev => ({
        name:  ev.name || (ev.kind || 'Event'),
        time24: ev.time || '',
        time12: formatTime12h(ev.time),
        parkCode: parkLetter(parkForTime(day, ev.time) || day.park),
        kind:  ev.kind || 'other'
      }));
      return {
        breakfast: meal('breakfast'),
        lunch:     meal('lunch'),
        dinner:    meal('dinner'),
        snacks:    snackCount,
        events:    evRows
      };
    }
    function summaryHTML(date, opts = {}) {
      const s = summarizeDay(date);
      if (!s) return `<div class="day-summary" data-date="${date}"></div>`;
      const maxLen = opts.maxLen || 13;
      const mealRow = (label, name) => {
        const display = name ? truncateName(name, maxLen) : '—';
        const cls = name ? 'text-white/70' : 'text-white/25';
        const title = name ? esc(name) : '';
        return `<div class="ds-row">
          <span class="ds-slot">${label}</span>
          <span class="${cls} truncate" title="${title}">${esc(display)}</span>
        </div>`;
      };
      const eventRows = s.events.map(ev => {
        const display = truncateName(ev.name, maxLen);
        const tip = `${ev.parkCode ? ev.parkCode + ' • ' : ''}${ev.time12 || ev.time24 || '?'} — ${ev.name}`;
        return `<div class="ds-row" title="${attr(tip)}">
          <span class="ds-park">${esc(ev.parkCode || '')}</span>
          <span class="ds-time">${esc(ev.time12 || ev.time24 || '')}</span>
          <span class="text-white/70 truncate">${esc(display)}</span>
        </div>`;
      }).join('');
      const eventsBlock = eventRows ? `<div class="ds-events-divider"></div>${eventRows}` : '';
      const countLine = s.snacks
        ? `<div class="ds-counts"><span class="ds-count">🍪 ${s.snacks}</span></div>`
        : '';
      return `<div class="day-summary" data-date="${date}">
        ${mealRow('B', s.breakfast)}
        ${mealRow('L', s.lunch)}
        ${mealRow('D', s.dinner)}
        ${eventsBlock}
        ${countLine}
      </div>`;
    }
    function rerenderDaySummary(date) {
      document.querySelectorAll(`.day-summary[data-date="${date}"]`).forEach(el => {
        el.outerHTML = summaryHTML(date);
      });
    }

    function shortPark(p) {
      if (!p) return '';
      return p
        .replace('Water Park - Typhoon Lagoon', 'WP Typhoon')
        .replace('Water Park - Blizzard Beach', 'WP Blizzard')
        .replace('Hollywood Studios', 'HS')
        .replace('Magic Kingdom', 'MK')
        .replace('Animal Kingdom', 'AK')
        .replace('Disney Springs', 'DS')
        .replace('Resort Day', 'Resort')
        .replace('Travel Day', 'Travel')
        .replace('Split Day', 'Split');
    }
    // Display the user's actual park assignment (from the active plan), not
    // the static defaultPark. Split days show both halves: "AK → HS".
    function displayPark(td) {
      const plan = activePlan && activePlan.plan;
      const day = plan && plan.days && plan.days[td.date];
      if (day && day.splitDay && day.splitParks) {
        return `${shortPark(day.splitParks.am)} → ${shortPark(day.splitParks.pm)}`;
      }
      return shortPark((day && day.park) || td.defaultPark);
    }
    function dateShort(td) {
      const d = new Date(td.date + 'T12:00:00');
      return `${td.dow.slice(0,3)} ${d.getMonth()+1}/${d.getDate()}`;
    }
    function attr(s) { return String(s).replace(/"/g, '&quot;'); }
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // Time parsing — accepts "8:00", "8:00a", "8:30 PM", "18:30", "8", etc.
    // Without am/pm marker: hours 1-6 are treated as PM (no Disney dining 1-6am).
    // Hours 7-11 are treated as AM (typical breakfast). 12+ is 24-hour as written.
    function parseTimeMinutes(s) {
      if (!s) return null;
      const t = String(s).trim().toLowerCase().replace(/\s+/g, '');
      let m = t.match(/^(\d{1,2})(?::(\d{2}))?(a|p|am|pm)?$/);
      if (!m) return null;
      let h = parseInt(m[1], 10);
      const mn = parseInt(m[2] || '0', 10);
      const ampm = m[3] && m[3][0];
      if (h > 23 || mn > 59) return null;
      if (ampm === 'a') { if (h === 12) h = 0; }
      else if (ampm === 'p') { if (h !== 12) h += 12; }
      else if (h >= 1 && h <= 6) { h += 12; }
      return h * 60 + mn;
    }
    function classifyMeal(s) {
      const m = parseTimeMinutes(s);
      if (m == null) return 'unknown';
      if (m < 11 * 60) return 'breakfast';
      if (m < 16 * 60 + 30) return 'lunch';
      return 'dinner';
    }
    function normalizeHHMM(s) {
      const m = parseTimeMinutes(s);
      if (m == null) return null;
      const h = Math.floor(m / 60), mn = m % 60;
      return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
    }

    // Cell value parsing/serialization. Format: "*8:00, 8:30, 9:15" — comma-separated tokens, * prefix = picked.
    function parseTokens(str) {
      if (!str) return [];
      return String(str).split(',').map(s => s.trim()).filter(Boolean).map(token => {
        const picked = token.startsWith('*');
        const time = (picked ? token.slice(1).trim() : token);
        return { time, picked };
      });
    }
    function serializeTokens(tokens) {
      return tokens.map(t => (t.picked ? '*' : '') + t.time).join(', ');
    }

    // Active scenario plan handling — read/write the same localStorage the planner uses.
    function loadActivePlan() {
      const name = Storage.loadActiveScenario();
      const plan = Storage.load(name) || Storage.getDefaultPlan();
      return { name, plan };
    }
    function saveActivePlan(name, plan) {
      plan.lastModified = new Date().toISOString();
      Storage.save(name, plan);
    }
    let activePlan = loadActivePlan();
    function refreshActivePlan() { activePlan = loadActivePlan(); }
    // Cross-tab sync — if the planner saves while we're open, pick it up.
    window.addEventListener('storage', e => {
      if (!e.key) return;
      const planKey = 'ddp_planner_' + activePlan.name;
      if (e.key === 'ddp_planner_active' || e.key === planKey) {
        refreshActivePlan();
        renderEntry();
        renderMatrix();
        lucide.createIcons();
      }
    });

    // Pick the slot for a confirmed selection.
    // Snack-credit restaurants → first empty snack slot (or the slot already holding the same restaurant).
    // Otherwise → meal slot derived from time (breakfast/lunch/dinner).
    function pickSlot(r, time, day) {
      if (r.creditCategory === 'sn') {
        // If a snack slot already holds this restaurant, reuse it
        for (const slot of MEAL_SLOTS) {
          if (!slot.startsWith('snack')) continue;
          const sel = day.selections[slot];
          if (sel && sel.restaurantId === r.id) return slot;
        }
        // Otherwise first empty snack slot
        for (const slot of MEAL_SLOTS) {
          if (!slot.startsWith('snack')) continue;
          if (!day.selections[slot]) return slot;
        }
        return null; // all snack slots full
      }
      const meal = classifyMeal(time);
      if (meal === 'breakfast' || meal === 'lunch' || meal === 'dinner') return meal;
      return null;
    }

    // Is the chip's (r, date, time) currently the booked selection in the active plan?
    function isChipBooked(r, date, time) {
      if (!r || r.id == null) return null;
      const day = activePlan.plan.days && activePlan.plan.days[date];
      if (!day || !day.selections) return null;
      const target = normalizeHHMM(time);
      if (!target) return null;
      for (const slot of MEAL_SLOTS) {
        const sel = day.selections[slot];
        if (sel && sel.restaurantId === r.id && normalizeHHMM(sel.time) === target) return slot;
      }
      return null;
    }

    function bookSelection(r, date, time) {
      if (!r || r.id == null) {
        alert('Cannot confirm: this restaurant is CSV-only (no database id). Pick it directly in the planner.');
        return false;
      }
      const day = activePlan.plan.days && activePlan.plan.days[date];
      if (!day) {
        alert('No day entry for ' + date + ' in the active plan. Open the planner first.');
        return false;
      }
      const slot = pickSlot(r, time, day);
      if (!slot) {
        alert(r.creditCategory === 'sn'
          ? 'All four snack slots are full for this day — clear one in the planner first.'
          : 'Could not classify time "' + time + '" as breakfast/lunch/dinner.');
        return false;
      }
      const existing = day.selections[slot];
      if (existing && existing.restaurantId !== r.id) {
        const existingR = allMerged.find(x => x.id === existing.restaurantId);
        const existingName = existingR ? existingR.name : 'another restaurant';
        if (!confirm(`The ${slot} slot on ${date} already holds ${existingName} at ${existing.time || '?'}. Replace with ${r.name} at ${time}?`)) return false;
      }
      const td = TRIP_DAYS.find(d => d.date === date);
      const acceptsDDP = r.acceptsDDP !== false;
      const diners = ['david', 'lisa', 'dante', 'djr'];
      day.selections[slot] = {
        restaurantId: r.id,
        paymentMethod: acceptsDDP ? 'ddp' : 'oop',
        pool: acceptsDDP ? choosePoolForBooking(td, r, diners) : null,
        notes: '',
        adrNumber: '',
        diners,
        time: normalizeHHMM(time)
      };
      saveActivePlan(activePlan.name, activePlan.plan);
      return true;
    }

    // On overlap days (June 8: A expiring + B fresh), drain A first if A
    // still has capacity for this credit category — A's credits expire
    // that night, so spending B first wastes them.
    function choosePoolForBooking(td, r, diners) {
      if (!td) return null;
      if (!(td.overlapPool === 'A' && td.pool === 'B')) return td.pool;
      const cat = r.creditCategory;
      if (!cat || cat === 'oop') return td.pool;
      const needed = cat === 'sn' ? r.creditsConsumed : r.creditsConsumed * (diners?.length || 4);
      const balanceA = CreditEngine.getBalance('A', activePlan.plan);
      return balanceA[cat] && balanceA[cat].remaining >= needed ? 'A' : td.pool;
    }

    function unbookSelection(r, date) {
      if (!r || r.id == null) return false;
      const day = activePlan.plan.days && activePlan.plan.days[date];
      if (!day || !day.selections) return false;
      let cleared = false;
      for (const slot of MEAL_SLOTS) {
        const sel = day.selections[slot];
        if (sel && sel.restaurantId === r.id) {
          day.selections[slot] = null;
          cleared = true;
        }
      }
      if (cleared) saveActivePlan(activePlan.name, activePlan.plan);
      return cleared;
    }

    // Render a chip cell's inner HTML (chips grouped by meal, add input, confirm/unbook row).
    function renderCellInner(r, date, str) {
      const tokens = parseTokens(str).map((t, idx) => ({
        ...t,
        idx,
        meal: classifyMeal(t.time),
        minutes: parseTimeMinutes(t.time),
        bookedSlot: isChipBooked(r, date, t.time)
      }));
      const groupOrder = ['breakfast', 'lunch', 'dinner', 'unknown'];
      const groups = {};
      tokens.forEach(t => {
        if (!groups[t.meal]) groups[t.meal] = [];
        groups[t.meal].push(t);
      });
      Object.values(groups).forEach(g => g.sort((a, b) => (a.minutes ?? 9999) - (b.minutes ?? 9999)));
      const presentGroups = groupOrder.filter(g => groups[g] && groups[g].length);
      const groupHtml = presentGroups.map((g, gi) => {
        const chips = groups[g].map(t => {
          const cls = ['time-chip'];
          if (t.picked) cls.push('picked');
          if (t.bookedSlot) cls.push('confirmed');
          const titleParts = [];
          if (t.bookedSlot) titleParts.push('Booked in ' + t.bookedSlot);
          if (t.picked && !t.bookedSlot) titleParts.push('Picked — click Book to confirm');
          return `<span class="${cls.join(' ')}" data-act="pick" data-idx="${t.idx}" title="${attr(titleParts.join(' • '))}">
            <span>${esc(t.time)}${t.bookedSlot ? ' ✓' : ''}</span>
            <span class="chip-x" data-act="del">×</span>
          </span>`;
        }).join('');
        return (gi > 0 ? '<div class="meal-divider"></div>' : '') + `<div class="chip-row">${chips}</div>`;
      }).join('');

      const pickedToken = tokens.find(t => t.picked);
      const bookedToken = tokens.find(t => t.bookedSlot);
      let actionRow = '';
      if (bookedToken) {
        actionRow = `<div class="confirm-row">
          <span class="booked-tag" title="Saved to planner ${bookedToken.bookedSlot}">✓ Booked ${esc(bookedToken.time)}</span>
          <span class="unbook-link" data-act="unbook">Unbook</span>
        </div>`;
      } else if (pickedToken) {
        const canBook = r.id != null;
        actionRow = `<div class="confirm-row">
          <button class="confirm-btn" data-act="book" data-time="${attr(pickedToken.time)}" ${canBook ? '' : 'disabled title="CSV-only restaurant"'}>Book ${esc(pickedToken.time)}</button>
        </div>`;
      }

      return `${groupHtml}
        <div class="chip-row">
          <input type="text" class="chip-add" placeholder="+ time" data-act="add">
        </div>
        ${actionRow}`;
    }

    function getCellRaw(id, date) { return (availability[id] && availability[id][date]) || ''; }

    function cellClasses(r, date) {
      const tokens = parseTokens(getCellRaw(rid(r), date));
      const cls = ['chip-cell'];
      if (tokens.length) cls.push('has-data');
      if (tokens.some(t => isChipBooked(r, date, t.time))) cls.push('has-confirmed');
      return cls.join(' ');
    }

    function rerenderCells(r, date) {
      const id = rid(r);
      const sel = `.chip-cell[data-id="${CSS.escape(id)}"][data-date="${date}"]`;
      const html = renderCellInner(r, date, getCellRaw(id, date));
      document.querySelectorAll(sel).forEach(el => {
        el.className = cellClasses(r, date);
        el.innerHTML = html;
      });
    }

    function renderEntry() {
      const root = document.getElementById('entry-view');
      if (!shortlist.length) { root.innerHTML = ''; return; }
      const days = visibleDays();
      root.innerHTML = visibleShortlist().map(r => {
        const id = rid(r);
        const meta = [r.location, r.priceTier].filter(Boolean).join(' • ');
        const cells = days.map(td => {
          const val = (availability[id] && availability[id][td.date]) || '';
          return `
            <div class="flex flex-col gap-1">
              <div class="text-[10px] flex items-center justify-between gap-1">
                <span class="font-semibold text-white/70">${dateShort(td)}</span>
                <span class="text-white/30 truncate flex-1 text-right">${esc(displayPark(td))}</span>
                <span class="hide-btn" data-act="hide-date" data-date="${td.date}" title="Hide this date">×</span>
              </div>
              ${summaryHTML(td.date, { maxLen: 11 })}
              <div class="${cellClasses(r, td.date)}" data-id="${attr(id)}" data-date="${td.date}">
                ${renderCellInner(r, td.date, val)}
              </div>
            </div>`;
        }).join('');
        return `
          <div class="glass-card p-3 mb-3 ${rowCls(r)}">
            <div class="flex items-start justify-between mb-2 gap-2">
              <div class="min-w-0">
                <div class="text-sm font-semibold truncate">${esc(r.name)}</div>
                <div class="text-[10px] text-white/40">${esc(meta)}</div>
              </div>
              <div class="flex items-center gap-1 flex-shrink-0 flex-wrap justify-end">
                ${vipBadge(r)}
                ${r.creditType ? `<span class="badge ${badgeCls(r.creditType)}">${r.creditType}</span>` : ''}
                <span class="hide-btn" data-act="hide-rid" data-rid="${attr(id)}" title="Hide this restaurant">×</span>
              </div>
            </div>
            <div class="grid gap-2" style="grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));">
              ${cells}
            </div>
          </div>`;
      }).join('');
    }

    function renderMatrix() {
      const root = document.getElementById('matrix-view');
      if (!shortlist.length) { root.innerHTML = ''; return; }

      const days = visibleDays();
      const headerCells = days.map(td => `
        <th class="px-2 py-2 text-xs text-left font-semibold min-w-[140px] align-top">
          <div class="flex items-start justify-between gap-1">
            <div>
              <div>${dateShort(td)}</div>
              <div class="text-[10px] text-white/40 font-normal">${esc(displayPark(td))}</div>
            </div>
            <span class="hide-btn" data-act="hide-date" data-date="${td.date}" title="Hide this date">×</span>
          </div>
          ${summaryHTML(td.date)}
        </th>`).join('');

      const rows = visibleShortlist().map(r => {
        const id = rid(r);
        const cells = days.map(td => {
          const val = (availability[id] && availability[id][td.date]) || '';
          return `<td class="px-1 py-1 align-top">
            <div class="${cellClasses(r, td.date)}" data-id="${attr(id)}" data-date="${td.date}">
              ${renderCellInner(r, td.date, val)}
            </div>
          </td>`;
        }).join('');
        return `<tr class="${rowCls(r)}">
          <td class="name-col px-3 py-2 align-top min-w-[200px]">
            <div class="flex items-start justify-between gap-1">
              <div class="min-w-0 flex-1">
                <div class="text-xs font-medium truncate">${esc(r.name)}</div>
                <div class="text-[10px] text-white/40 truncate">${esc(r.location || '')}</div>
                <div class="mt-1 flex flex-wrap gap-1">
                  ${r.creditType ? `<span class="badge ${badgeCls(r.creditType)}">${r.creditType}</span>` : ''}
                  ${vipBadge(r)}
                </div>
              </div>
              <span class="hide-btn" data-act="hide-rid" data-rid="${attr(id)}" title="Hide this restaurant">×</span>
            </div>
          </td>
          ${cells}
        </tr>`;
      }).join('');

      root.innerHTML = `
        <div class="glass-card overflow-hidden">
          <div class="overflow-x-auto" style="max-height: calc(100vh - 130px);">
            <table class="matrix-table w-full">
              <thead>
                <tr class="text-white/60 text-left">
                  <th class="name-col px-3 py-2 text-xs min-w-[200px]">Restaurant</th>
                  ${headerCells}
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    let currentView = localStorage.getItem(VIEW_KEY) || 'entry';
    function setView(v) {
      currentView = v;
      localStorage.setItem(VIEW_KEY, v);
      document.getElementById('entry-view').classList.toggle('hidden', v !== 'entry');
      document.getElementById('matrix-view').classList.toggle('hidden', v !== 'matrix');
      ['entry','matrix'].forEach(k => {
        document.getElementById('view-' + k).classList.toggle('active', k === v);
      });
    }
    document.getElementById('view-entry').addEventListener('click', () => setView('entry'));
    document.getElementById('view-matrix').addEventListener('click', () => setView('matrix'));

    // Lookup helpers used by event handlers below
    function findRestaurantByRid(id) { return allMerged.find(r => rid(r) === id); }
    function cellContext(target) {
      const cell = target.closest('.chip-cell');
      if (!cell) return null;
      const id = cell.getAttribute('data-id');
      const date = cell.getAttribute('data-date');
      const r = findRestaurantByRid(id);
      if (!r) return null;
      return { cell, id, date, r };
    }

    // Hide-button clicks (handled outside cellContext since they live in headers/name col)
    document.body.addEventListener('click', e => {
      const hideBtn = e.target.closest('[data-act="hide-rid"], [data-act="hide-date"]');
      if (!hideBtn) return;
      const act = hideBtn.getAttribute('data-act');
      if (act === 'hide-rid') hiddenRids.add(hideBtn.getAttribute('data-rid'));
      else hiddenDates.add(hideBtn.getAttribute('data-date'));
      saveHidden();
      updateHiddenBar();
      renderEntry();
      renderMatrix();
      lucide.createIcons();
    });

    // Click delegation: pick chip / delete chip / book / unbook
    document.body.addEventListener('click', e => {
      const ctx = cellContext(e.target);
      if (!ctx) return;
      const { id, date, r } = ctx;
      const xBtn = e.target.closest('.chip-x');
      const chip = e.target.closest('.time-chip');
      const bookBtn = e.target.closest('[data-act="book"]');
      const unbookLink = e.target.closest('[data-act="unbook"]');

      if (bookBtn) {
        const time = bookBtn.getAttribute('data-time');
        if (bookSelection(r, date, time)) {
          rerenderCells(r, date);
          rerenderDaySummary(date);
        }
        return;
      }
      if (unbookLink) {
        if (unbookSelection(r, date)) {
          rerenderCells(r, date);
          rerenderDaySummary(date);
        }
        return;
      }
      if (xBtn && chip) {
        const idx = parseInt(chip.getAttribute('data-idx'), 10);
        const tokens = parseTokens(getCellRaw(id, date));
        tokens.splice(idx, 1);
        setCell(id, date, serializeTokens(tokens));
        rerenderCells(r, date);
        e.stopPropagation();
        return;
      }
      if (chip) {
        const idx = parseInt(chip.getAttribute('data-idx'), 10);
        const tokens = parseTokens(getCellRaw(id, date));
        if (!tokens[idx]) return;
        const wasPicked = tokens[idx].picked;
        // single-pick semantics: clear all picks first, then toggle this one
        tokens.forEach(t => { t.picked = false; });
        tokens[idx].picked = !wasPicked;
        setCell(id, date, serializeTokens(tokens));
        rerenderCells(r, date);
      }
    });

    // Add input: Enter or blur commits new time(s)
    function commitAddInput(input) {
      const ctx = cellContext(input);
      if (!ctx) return;
      const { id, date, r } = ctx;
      const raw = input.value.trim();
      input.value = '';
      if (!raw) return;
      const tokens = parseTokens(getCellRaw(id, date));
      raw.split(',').map(s => s.trim()).filter(Boolean).forEach(t => {
        const picked = t.startsWith('*');
        const time = picked ? t.slice(1).trim() : t;
        if (time) tokens.push({ time, picked });
      });
      setCell(id, date, serializeTokens(tokens));
      rerenderCells(r, date);
    }
    document.body.addEventListener('keydown', e => {
      if (!e.target.matches || !e.target.matches('.chip-add')) return;
      if (e.key === 'Enter') {
        e.preventDefault();
        commitAddInput(e.target);
      }
    });
    document.body.addEventListener('focusout', e => {
      if (!e.target.matches || !e.target.matches('.chip-add')) return;
      commitAddInput(e.target);
    });

    function exportAvailability() {
      const blob = new Blob([JSON.stringify(availability, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `dining-availability-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Resolve a JSON-import key to {rid, restaurant}. Lenient about format:
    //   "db:5", "csv:Be Our Guest"  → strict (preferred)
    //   "5" or 5                     → treated as db:5
    //   "Be Our Guest"               → tried as csv:exact, then fuzzy by name
    function resolveImportKey(rawKey) {
      const key = String(rawKey).trim();
      if (!key) return null;
      // Strict prefixes
      if (key.startsWith('db:')) {
        const n = parseInt(key.slice(3), 10);
        const r = allMerged.find(x => x.id === n);
        return r ? { rid: 'db:' + n, restaurant: r } : null;
      }
      if (key.startsWith('csv:')) {
        const name = key.slice(4);
        let r = allMerged.find(x => x.id == null && x.name === name);
        if (!r) r = RestaurantMerge.findByName(name); // fuzzy fallback
        return r ? { rid: rid(r), restaurant: r } : null;
      }
      // Bare numeric → try as DB id
      if (/^\d+$/.test(key)) {
        const n = parseInt(key, 10);
        const r = allMerged.find(x => x.id === n);
        if (r) return { rid: 'db:' + n, restaurant: r };
      }
      // Bare string → try exact-name match (DB or CSV), then fuzzy
      let r = allMerged.find(x => x.name === key);
      if (!r) r = RestaurantMerge.findByName(key);
      if (r) return { rid: rid(r), restaurant: r };
      return null;
    }

    document.getElementById('import-file').addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data || typeof data !== 'object' || Array.isArray(data)) {
            throw new Error('Expected an object keyed by restaurant id');
          }
          let cellCount = 0;
          let addedCount = 0;
          let alreadyCount = 0;
          const unmatched = [];
          // Use the resolved shortlist (live array) as the source of truth —
          // entries in shortlistIds that don't resolve count as orphans and
          // should be replaced, not skipped.
          const liveSet = new Set(shortlist.map(r => rid(r)));
          for (const [rawKey, dates] of Object.entries(data)) {
            if (!dates || typeof dates !== 'object') continue;
            const resolved = resolveImportKey(rawKey);
            // Pick the canonical key for storage. If unresolved, keep raw key
            // so cells aren't lost (they just won't render until the rid is
            // matched manually).
            const storeKey = resolved ? resolved.rid : rawKey;
            if (!availability[storeKey]) availability[storeKey] = {};
            for (const [date, val] of Object.entries(dates)) {
              if (typeof val === 'string' && val.trim()) {
                availability[storeKey][date] = val.trim();
                cellCount++;
              }
            }
            if (Object.keys(availability[storeKey]).length === 0) {
              delete availability[storeKey];
              continue;
            }
            if (!resolved) {
              unmatched.push(rawKey);
              continue;
            }
            if (liveSet.has(resolved.rid)) {
              alreadyCount++;
              continue;
            }
            liveSet.add(resolved.rid);
            shortlistIds.push(resolved.rid);
            shortlist.push(resolved.restaurant);
            hiddenRids.delete(resolved.rid);
            addedCount++;
          }
          // Drop orphaned ids from shortlistIds so the saved list matches the
          // resolved live set (avoids the "looks empty even though IDs are
          // saved" failure mode this fix is targeting).
          const beforeCleanup = shortlistIds.length;
          shortlistIds = shortlistIds.filter(id => liveSet.has(id));
          const cleanedOrphans = beforeCleanup - shortlistIds.length;

          saveAvailability();
          localStorage.setItem(SHORTLIST_KEY, JSON.stringify(shortlistIds));
          saveHidden();
          document.getElementById('count-tag').textContent = shortlist.length ? `${shortlist.length} saved` : '';
          if (shortlist.length) {
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('view-entry').disabled = false;
            document.getElementById('view-matrix').disabled = false;
          }
          updateHiddenBar();
          renderEntry();
          renderMatrix();
          setView(currentView);
          lucide.createIcons();

          const parts = [`Imported ${cellCount} availability entries across ${Object.keys(data).length} restaurants.`];
          if (addedCount)     parts.push(`Added ${addedCount} to shortlist.`);
          if (alreadyCount)   parts.push(`${alreadyCount} already shortlisted.`);
          if (cleanedOrphans) parts.push(`Cleaned ${cleanedOrphans} orphaned id${cleanedOrphans === 1 ? '' : 's'} from shortlist.`);
          if (unmatched.length) {
            const sample = unmatched.slice(0, 3).map(k => `"${k}"`).join(', ');
            const more = unmatched.length > 3 ? ` (+${unmatched.length - 3} more)` : '';
            parts.push(`${unmatched.length} key${unmatched.length === 1 ? '' : 's'} did not match any restaurant: ${sample}${more}. Cells were saved but won't display until you fix the keys.`);
          }
          alert(parts.join('\n'));
        } catch (err) {
          alert('Failed to import: ' + err.message);
        } finally {
          e.target.value = '';
        }
      };
      reader.readAsText(file);
    });

    function toggleTheme() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('ddp_planner_theme', isLight ? 'light' : 'dark');
      document.getElementById('theme-icon').setAttribute('data-lucide', isLight ? 'sun' : 'moon');
      lucide.createIcons();
    }
    if (localStorage.getItem('ddp_planner_theme') === 'light') {
      document.body.classList.add('light-mode');
      document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
    }

    document.getElementById('show-all-hidden').addEventListener('click', () => {
      hiddenRids.clear();
      hiddenDates.clear();
      saveHidden();
      updateHiddenBar();
      renderEntry();
      renderMatrix();
      lucide.createIcons();
    });

    if (!shortlist.length) {
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('view-entry').disabled = true;
      document.getElementById('view-matrix').disabled = true;
    } else {
      renderEntry();
      renderMatrix();
    }
    setView(currentView);
    updateHiddenBar();
    lucide.createIcons();
    syncSimButton();
  </script>
</body>
</html>
