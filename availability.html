<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disney DDP Planner — Reservation Availability</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    };
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .row-ts { border-left: 3px solid var(--pool-a); }
    .row-2ts { border-left: 3px solid #a78bfa; }
    .row-qs { border-left: 3px solid var(--pool-b); }
    .row-sn { border-left: 3px solid #fbbf24; }
    .row-oop { border-left: 3px solid var(--oop); }
    .row-unknown { border-left: 3px solid rgba(255,255,255,0.1); }

    .avail-input {
      width: 100%;
      min-height: 36px;
      resize: vertical;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 11px;
      line-height: 1.3;
      color: white;
      font-family: inherit;
    }
    .avail-input:focus {
      outline: none;
      border-color: rgba(251,191,36,0.5);
      background: rgba(255,255,255,0.07);
    }
    .avail-input::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }
    .avail-input:not(:placeholder-shown) {
      border-color: rgba(251,191,36,0.45);
      background: rgba(251,191,36,0.08);
    }
    body.light-mode .avail-input { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #1e293b; }
    body.light-mode .avail-input::placeholder { color: rgba(0,0,0,0.3); }
    body.light-mode .avail-input:not(:placeholder-shown) {
      border-color: rgba(217,119,6,0.5);
      background: rgba(251,191,36,0.18);
    }

    .matrix-table { border-collapse: separate; border-spacing: 0; }
    .matrix-table th, .matrix-table td { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .matrix-table thead th {
      position: sticky; top: 0;
      background: rgba(2,6,23,0.95);
      backdrop-filter: blur(10px);
      z-index: 5;
    }
    .matrix-table .name-col {
      position: sticky; left: 0;
      background: rgba(2,6,23,0.95);
      backdrop-filter: blur(10px);
      z-index: 4;
    }
    .matrix-table thead th.name-col { z-index: 6; }
    body.light-mode .matrix-table thead th,
    body.light-mode .matrix-table .name-col { background: rgba(255,255,255,0.95); }

    .view-btn { color: rgba(255,255,255,0.5); }
    .view-btn.active { background: rgba(251,191,36,0.18); color: #fcd34d; }
    body.light-mode .view-btn.active { color: #b45309; background: rgba(251,191,36,0.25); }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

  <div class="bg-blob" style="width:600px;height:600px;top:-200px;left:-100px;background:#3b82f6;"></div>
  <div class="bg-blob" style="width:500px;height:500px;bottom:-150px;right:-100px;background:#22c55e;"></div>

  <header class="sticky top-0 z-30 glass-card-darker border-b border-white/10" style="border-radius:0;">
    <div class="max-w-[1600px] mx-auto px-4 py-2 flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span class="text-xs hidden sm:inline">Planner</span>
      </a>
      <a href="restaurants.html" class="text-xs text-white/50 hover:text-amber-400 hidden sm:inline">All Restaurants</a>
      <div class="w-px h-5 bg-white/10 hidden sm:block"></div>
      <div class="flex items-center gap-2 mr-auto">
        <i data-lucide="calendar-check" class="w-5 h-5 text-amber-400"></i>
        <h1 class="text-base font-bold tracking-tight">Reservation Availability</h1>
        <span class="text-[10px] text-white/30 font-mono" id="count-tag"></span>
      </div>
      <div class="flex items-center gap-0.5 bg-white/5 rounded-lg p-0.5">
        <button id="view-entry"  class="view-btn px-2 py-1 text-xs rounded-md transition-colors">Entry</button>
        <button id="view-matrix" class="view-btn px-2 py-1 text-xs rounded-md transition-colors">Matrix</button>
      </div>
      <button onclick="exportAvailability()" class="p-1.5 hover:bg-white/10 rounded-lg transition-colors" title="Export availability JSON">
        <i data-lucide="upload" class="w-4 h-4"></i>
      </button>
      <button onclick="document.getElementById('import-file').click()" class="p-1.5 hover:bg-white/10 rounded-lg transition-colors" title="Import availability JSON (merges with existing)">
        <i data-lucide="download" class="w-4 h-4"></i>
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none">
      <button onclick="toggleTheme()" class="p-1.5 hover:bg-white/10 rounded-lg transition-colors" title="Toggle theme">
        <i data-lucide="moon" class="w-4 h-4" id="theme-icon"></i>
      </button>
    </div>
  </header>

  <main class="max-w-[1600px] mx-auto px-4 py-4">

    <div id="empty-state" class="hidden glass-card p-8 text-center text-white/60">
      <i data-lucide="bookmark" class="w-12 h-12 mx-auto mb-3 text-white/20"></i>
      <p class="mb-2 text-sm">No saved restaurants yet.</p>
      <p class="text-xs">Go to <a href="restaurants.html" class="text-amber-400 hover:underline">All Restaurants</a> and check the ★ box on the ones you want to track.</p>
    </div>

    <div id="entry-view"></div>
    <div id="matrix-view" class="hidden"></div>

  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="js/config.js"></script>
  <script src="js/restaurant-db.js"></script>
  <script src="js/csv-restaurants.js"></script>
  <script src="js/restaurant-merge.js"></script>
  <script>
    const SHORTLIST_KEY = 'ddp_planner_shortlist';
    const AVAIL_KEY = 'ddp_planner_availability';
    const VIEW_KEY = 'ddp_planner_avail_view';

    function rid(r) { return r.id != null ? 'db:' + r.id : 'csv:' + r.name; }

    const allMerged = RestaurantMerge.getMerged();

    let shortlistIds = [];
    try { shortlistIds = JSON.parse(localStorage.getItem(SHORTLIST_KEY) || '[]'); } catch(e) {}

    let availability = {};
    try { availability = JSON.parse(localStorage.getItem(AVAIL_KEY) || '{}'); } catch(e) { availability = {}; }

    function saveAvailability() { localStorage.setItem(AVAIL_KEY, JSON.stringify(availability)); }
    function setCell(id, date, value) {
      const v = (value || '').trim();
      if (!availability[id]) availability[id] = {};
      if (v) availability[id][date] = v;
      else delete availability[id][date];
      if (Object.keys(availability[id]).length === 0) delete availability[id];
      saveAvailability();
    }

    const shortlist = shortlistIds
      .map(id => allMerged.find(r => rid(r) === id))
      .filter(Boolean);

    document.getElementById('count-tag').textContent = shortlist.length ? `${shortlist.length} saved` : '';

    function rowCls(r) {
      return r.creditType === '1TS' ? 'row-ts'
        : r.creditType === '2TS' ? 'row-2ts'
        : r.creditType === 'QS'  ? 'row-qs'
        : r.creditType === 'SN'  ? 'row-sn'
        : r.creditType === 'OOP' ? 'row-oop'
        : 'row-unknown';
    }
    function badgeCls(t) {
      return { '1TS':'badge-ts', '2TS':'badge-2ts', 'QS':'badge-qs', 'SN':'badge-sn', 'OOP':'badge-oop' }[t] || '';
    }

    const MEAL_ABBR = { breakfast: 'B', lunch: 'L', dinner: 'D', brunch: 'Br' };
    function vipMealsShort(meals) {
      if (!meals || !meals.length) return '';
      return meals.map(m => MEAL_ABBR[m] || (m[0] || '').toUpperCase()).join(',');
    }
    function vipBadge(r) {
      if (!r.vipDiscountPct) return '';
      const short = vipMealsShort(r.vipDiscountMeals);
      const fullMeals = (r.vipDiscountMeals || []).join(', ') || 'all meals';
      const note = r.vipDiscountNotes || 'Mon–Thu only';
      const tooltip = `${r.vipDiscountPct}% VIP off ${fullMeals} — ${note}`;
      return `<span class="badge badge-vip" title="${attr(tooltip)}">${r.vipDiscountPct}% VIP${short ? ' ' + short : ''}</span>`;
    }

    function shortPark(p) {
      if (!p) return '';
      return p
        .replace('Water Park - Typhoon Lagoon', 'WP Typhoon')
        .replace('Water Park - Blizzard Beach', 'WP Blizzard')
        .replace('Hollywood Studios', 'HS')
        .replace('Magic Kingdom', 'MK')
        .replace('Animal Kingdom', 'AK');
    }
    function dateShort(td) {
      const d = new Date(td.date + 'T12:00:00');
      return `${td.dow.slice(0,3)} ${d.getMonth()+1}/${d.getDate()}`;
    }
    function attr(s) { return String(s).replace(/"/g, '&quot;'); }
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function renderEntry() {
      const root = document.getElementById('entry-view');
      if (!shortlist.length) { root.innerHTML = ''; return; }
      root.innerHTML = shortlist.map(r => {
        const id = rid(r);
        const meta = [r.location, r.priceTier].filter(Boolean).join(' • ');
        const cells = TRIP_DAYS.map(td => {
          const val = (availability[id] && availability[id][td.date]) || '';
          return `
            <div class="flex flex-col gap-1">
              <div class="text-[10px] flex items-center justify-between gap-1">
                <span class="font-semibold text-white/70">${dateShort(td)}</span>
                <span class="text-white/30 truncate">${esc(shortPark(td.defaultPark))}</span>
              </div>
              <textarea class="avail-input" rows="2"
                data-id="${attr(id)}"
                data-date="${td.date}"
                placeholder="8:00, 8:30...">${esc(val)}</textarea>
            </div>`;
        }).join('');
        return `
          <div class="glass-card p-3 mb-3 ${rowCls(r)}">
            <div class="flex items-start justify-between mb-2 gap-2">
              <div class="min-w-0">
                <div class="text-sm font-semibold truncate">${esc(r.name)}</div>
                <div class="text-[10px] text-white/40">${esc(meta)}</div>
              </div>
              <div class="flex items-center gap-1 flex-shrink-0 flex-wrap justify-end">
                ${vipBadge(r)}
                ${r.creditType ? `<span class="badge ${badgeCls(r.creditType)}">${r.creditType}</span>` : ''}
              </div>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-2">
              ${cells}
            </div>
          </div>`;
      }).join('');
    }

    function renderMatrix() {
      const root = document.getElementById('matrix-view');
      if (!shortlist.length) { root.innerHTML = ''; return; }

      const headerCells = TRIP_DAYS.map(td => `
        <th class="px-2 py-2 text-xs text-left font-semibold min-w-[130px]">
          <div>${dateShort(td)}</div>
          <div class="text-[10px] text-white/40 font-normal">${esc(shortPark(td.defaultPark))}</div>
        </th>`).join('');

      const rows = shortlist.map(r => {
        const id = rid(r);
        const cells = TRIP_DAYS.map(td => {
          const val = (availability[id] && availability[id][td.date]) || '';
          return `<td class="px-1 py-1 align-top">
            <textarea class="avail-input" rows="2"
              data-id="${attr(id)}"
              data-date="${td.date}"
              placeholder="—">${esc(val)}</textarea>
          </td>`;
        }).join('');
        return `<tr class="${rowCls(r)}">
          <td class="name-col px-3 py-2 align-top min-w-[200px]">
            <div class="text-xs font-medium">${esc(r.name)}</div>
            <div class="text-[10px] text-white/40">${esc(r.location || '')}</div>
            <div class="mt-1 flex flex-wrap gap-1">
              ${r.creditType ? `<span class="badge ${badgeCls(r.creditType)}">${r.creditType}</span>` : ''}
              ${vipBadge(r)}
            </div>
          </td>
          ${cells}
        </tr>`;
      }).join('');

      root.innerHTML = `
        <div class="glass-card overflow-hidden">
          <div class="overflow-x-auto" style="max-height: calc(100vh - 130px);">
            <table class="matrix-table w-full">
              <thead>
                <tr class="text-white/60 text-left">
                  <th class="name-col px-3 py-2 text-xs min-w-[200px]">Restaurant</th>
                  ${headerCells}
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    let currentView = localStorage.getItem(VIEW_KEY) || 'entry';
    function setView(v) {
      currentView = v;
      localStorage.setItem(VIEW_KEY, v);
      document.getElementById('entry-view').classList.toggle('hidden', v !== 'entry');
      document.getElementById('matrix-view').classList.toggle('hidden', v !== 'matrix');
      ['entry','matrix'].forEach(k => {
        document.getElementById('view-' + k).classList.toggle('active', k === v);
      });
    }
    document.getElementById('view-entry').addEventListener('click', () => setView('entry'));
    document.getElementById('view-matrix').addEventListener('click', () => setView('matrix'));

    // Save on blur — sync the corresponding cell in the other view so values stay in sync
    document.body.addEventListener('focusout', e => {
      if (!e.target.matches || !e.target.matches('.avail-input')) return;
      const id   = e.target.getAttribute('data-id');
      const date = e.target.getAttribute('data-date');
      const val  = e.target.value;
      setCell(id, date, val);
      const sel = `.avail-input[data-id="${CSS.escape(id)}"][data-date="${date}"]`;
      document.querySelectorAll(sel).forEach(el => {
        if (el !== e.target) el.value = val;
      });
    });

    function exportAvailability() {
      const blob = new Blob([JSON.stringify(availability, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `dining-availability-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    document.getElementById('import-file').addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data || typeof data !== 'object' || Array.isArray(data)) {
            throw new Error('Expected an object keyed by restaurant id');
          }
          let cellCount = 0;
          for (const [id, dates] of Object.entries(data)) {
            if (!dates || typeof dates !== 'object') continue;
            if (!availability[id]) availability[id] = {};
            for (const [date, val] of Object.entries(dates)) {
              if (typeof val === 'string' && val.trim()) {
                availability[id][date] = val.trim();
                cellCount++;
              }
            }
            if (Object.keys(availability[id]).length === 0) delete availability[id];
          }
          saveAvailability();
          renderEntry();
          renderMatrix();
          lucide.createIcons();
          alert(`Imported ${cellCount} availability entries.`);
        } catch (err) {
          alert('Failed to import: ' + err.message);
        } finally {
          e.target.value = '';
        }
      };
      reader.readAsText(file);
    });

    function toggleTheme() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('ddp_planner_theme', isLight ? 'light' : 'dark');
      document.getElementById('theme-icon').setAttribute('data-lucide', isLight ? 'sun' : 'moon');
      lucide.createIcons();
    }
    if (localStorage.getItem('ddp_planner_theme') === 'light') {
      document.body.classList.add('light-mode');
      document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
    }

    if (!shortlist.length) {
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('view-entry').disabled = true;
      document.getElementById('view-matrix').disabled = true;
    } else {
      renderEntry();
      renderMatrix();
    }
    setView(currentView);
    lucide.createIcons();
  </script>
</body>
</html>
